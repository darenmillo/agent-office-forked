<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentOffice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0D0D08; color: #FFB000; font-family: 'Share Tech Mono', 'Courier New', monospace; }
      #phaser-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
      #ui-root { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2; pointer-events: none; }
      /* Allow clicks to pass through empty UI space to Phaser */
      #ui-root > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="phaser-container"></div>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
